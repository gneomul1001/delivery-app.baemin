<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가짜의 민족 - 실시간 검색 및 공유</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f6f6f6; }
        .baemin-navy { background-color: #2ac1bc; }
        .hidden { display: none; }
        .logo-font { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; letter-spacing: -0.05em; }
    </style>
</head>
<body>

<header class="baemin-navy text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-4xl mx-auto flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div onclick="showSection('category-section')" class="text-2xl logo-font cursor-pointer">가짜의 민족</div>
            <button onclick="showSection('cart-section')" class="relative text-sm font-bold bg-white/20 px-3 py-1 rounded-full">
                🛒 장바구니 <span id="cart-count" class="bg-red-500 text-[10px] rounded-full px-1.5 ml-1">0</span>
            </button>
        </div>
        <div class="relative">
            <input type="text" id="search-input" onkeyup="handleSearch(event)" placeholder="가게 이름을 검색해보세요!" class="w-full p-3 rounded-lg text-black focus:outline-none text-sm shadow-inner">
            <button onclick="executeSearch()" class="absolute right-3 top-3 text-gray-400">🔍</button>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4 mb-20">
    <section id="search-result-section" class="hidden">
        <div class="flex justify-between items-end mb-4 border-b pb-2">
            <h2 class="text-2xl font-black">검색 결과</h2>
            <button onclick="showSection('category-section')" class="text-gray-400 text-sm">닫기</button>
        </div>
        <div id="search-results-container" class="grid gap-3"></div>
    </section>

    <section id="category-section" class="grid grid-cols-4 gap-3 text-center mb-8"></section>

    <section id="restaurant-list-section" class="hidden">
        <div class="flex justify-between items-end mb-4 border-b pb-2">
            <h2 id="current-category-name" class="text-2xl font-black"></h2>
            <button onclick="showAddRestaurantModal()" class="text-blue-600 font-bold text-sm">+ 음식점 등록</button>
        </div>
        <div id="restaurants-container" class="grid gap-3"></div>
    </section>

    <section id="restaurant-detail-section" class="hidden">
        <div id="restaurant-info" class="bg-white p-6 rounded-t-2xl shadow-sm mb-1"></div>
        <div class="bg-white p-4 shadow-sm mb-4 rounded-b-2xl">
            <h3 class="font-black text-lg mb-6 border-l-4 border-[#2ac1bc] pl-3">메뉴판</h3>
            <div id="menu-container" class="grid gap-6"></div>
            <button onclick="showAddMenuModal()" class="w-full mt-6 py-2 bg-gray-50 text-gray-400 rounded-lg text-xs font-bold border border-dashed">+ 메뉴 추가하기</button>
        </div>
        <button onclick="showSection('category-section')" class="w-full py-4 bg-gray-200 rounded-xl font-bold">홈으로 가기</button>
    </section>

    <section id="cart-section" class="hidden">
        <h2 class="text-2xl font-black mb-6">장바구니</h2>
        <div id="cart-items" class="bg-white p-5 rounded-2xl shadow-sm mb-4"></div>
        <div id="cart-total" class="text-right font-black text-xl mb-6 text-[#2ac1bc]"></div>
        <button onclick="startDeliverySimulation()" class="w-full py-5 baemin-navy text-white rounded-2xl font-black shadow-xl">주문하기</button>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-md p-6 rounded-3xl">
        <h3 id="modal-title" class="text-xl font-black mb-5">입력창</h3>
        <div id="modal-content" class="flex flex-col gap-4"></div>
        <div class="flex gap-3 mt-8">
            <button onclick="closeModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 rounded-xl font-bold">취소</button>
            <button id="modal-confirm-btn" class="flex-1 py-3 baemin-navy text-white rounded-xl font-bold">등록하기</button>
        </div>
    </div>
</div>

<script>
    // Firebase 설정 (여기에 본인의 설정값을 넣으세요)
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const categories = ["한식", "중식", "일식", "동남아", "치킨", "피자", "족발", "야식", "도시락"];
    let allRestaurants = [];
    let localCart = [];
    let currentCategory = "";
    let currentRestaurantId = null;

    function init() {
        const catContainer = document.getElementById('category-section');
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-2xl shadow-sm cursor-pointer border hover:border-[#2ac1bc]";
            div.innerHTML = `<div class="text-3xl mb-2">🍱</div><div class="text-xs font-black text-gray-600">${cat}</div>`;
            div.onclick = () => showRestaurantList(cat);
            catContainer.appendChild(div);
        });

        database.ref('restaurants').on('value', (snapshot) => {
            const data = snapshot.val();
            // Firebase는 데이터를 객체로 주므로 배열로 변환
            allRestaurants = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
            
            // 현재 보고 있는 화면이 있다면 갱신
            if(!document.getElementById('restaurant-list-section').classList.contains('hidden')) renderRestaurants();
            if(!document.getElementById('restaurant-detail-section').classList.contains('hidden')) {
                const res = allRestaurants.find(r => r.id === currentRestaurantId);
                if(res) renderMenus(res);
            }
        });
    }

    // --- 검색 로직 ---
    function handleSearch(e) { if(e.key === 'Enter') executeSearch(); }
    function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        
        showSection('search-result-section');
        const container = document.getElementById('search-results-container');
        container.innerHTML = "";
        
        const filtered = allRestaurants.filter(r => r.name.includes(query));
        if(filtered.length === 0) {
            container.innerHTML = "<p class='text-center py-10 text-gray-400 font-bold'>검색 결과가 없습니다.</p>";
        } else {
            filtered.forEach(res => {
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl flex gap-5 cursor-pointer shadow-sm";
                div.onclick = () => showRestaurantDetail(res.id);
                div.innerHTML = `<div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-3xl">🏠</div><div class="flex-1"><h3 class="font-black text-lg">${res.name}</h3><p class="text-xs text-gray-400 font-bold">${res.category}</p></div>`;
                container.appendChild(div);
            });
        }
    }

    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function showRestaurantList(category) {
        currentCategory = category;
        document.getElementById('current-category-name').innerText = category;
        showSection('restaurant-list-section');
        renderRestaurants();
    }

    function renderRestaurants() {
        const container = document.getElementById('restaurants-container');
        container.innerHTML = "";
        const list = allRestaurants.filter(r => r.category === currentCategory);
        list.forEach(res => {
            const div = document.createElement('div');
            div.className = "bg-white p-5 rounded-2xl flex gap-5 cursor-pointer shadow-sm active:scale-95 transition-transform";
            div.onclick = () => showRestaurantDetail(res.id);
            div.innerHTML = `<div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center text-3xl">🏠</div><div class="flex-1"><h3 class="font-black text-lg">${res.name}</h3><p class="text-xs text-gray-400 mt-2 font-bold">★ 5.0 | 배달팁 0원</p></div>`;
            container.appendChild(div);
        });
    }

    function showRestaurantDetail(id) {
        currentRestaurantId = id;
        const res = allRestaurants.find(r => r.id === id);
        showSection('restaurant-detail-section');
        document.getElementById('restaurant-info').innerHTML = `<h2 class="text-3xl font-black text-gray-800">${res.name}</h2><p class="text-sm text-[#2ac1bc] font-bold mt-2">${res.category} 전문점</p>`;
        renderMenus(res);
    }

    function renderMenus(res) {
        const container = document.getElementById('menu-container');
        container.innerHTML = "";
        if(!res.menus) { container.innerHTML = "<p class='text-center py-10 text-gray-300 font-bold'>메뉴를 추가해주세요.</p>"; return; }
        
        Object.keys(res.menus).forEach(menuKey => {
            const m = res.menus[menuKey];
            const div = document.createElement('div');
            div.className = "flex justify-between items-center bg-gray-50/50 p-4 rounded-xl";
            div.innerHTML = `<div><p class="font-black text-gray-800">${m.name}</p><p class="text-sm text-[#2ac1bc] font-black">${parseInt(m.price).toLocaleString()}원</p></div><button onclick="addToCart('${res.name}', '${m.name}', ${m.price})" class="px-5 py-2 bg-white border-2 border-[#2ac1bc] text-[#2ac1bc] text-sm font-black rounded-full">담기</button>`;
            container.appendChild(div);
        });
    }

    function showAddRestaurantModal() {
        openModal("가게 등록", `<input id="new-res-name" type="text" placeholder="식당 이름" class="border-2 p-3 rounded-xl focus:border-[#2ac1bc] outline-none">`, () => {
            const name = document.getElementById('new-res-name').value;
            if(!name) return;
            const newRef = database.ref('restaurants').push();
            newRef.set({ category: currentCategory, name: name, menus: {} });
            closeModal();
        });
    }

    function showAddMenuModal() {
        openModal("메뉴 등록", `<input id="new-menu-name" type="text" placeholder="메뉴 이름" class="border-2 p-3 rounded-xl outline-none"><input id="new-menu-price" type="number" placeholder="가격" class="border-2 p-3 rounded-xl outline-none">`, () => {
            const name = document.getElementById('new-menu-name').value;
            const price = document.getElementById('new-menu-price').value;
            if(!name || !price) return;
            // 메뉴 추가 시 Firebase push()를 사용하여 고유 키 생성
            database.ref(`restaurants/${currentRestaurantId}/menus`).push({ name, price });
            closeModal();
        });
    }

    function addToCart(resName, menuName, price) {
        localCart.push({ resName, menuName, price });
        document.getElementById('cart-count').innerText = localCart.length;
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalDiv = document.getElementById('cart-total');
        container.innerHTML = "";
        let total = 0;
        if(localCart.length === 0) container.innerHTML = "<p class='text-center py-10 text-gray-400 font-bold'>비어있습니다.</p>";
        localCart.forEach(item => {
            total += parseInt(item.price);
            container.innerHTML += `<div class="flex justify-between py-3 border-b border-gray-50 last:border-0"><div><p class="text-[10px] text-gray-400 font-bold">${item.resName}</p><p class="font-black text-gray-700">${item.menuName}</p></div><p class="font-black text-gray-800">${parseInt(item.price).toLocaleString()}원</p></div>`;
        });
        totalDiv.innerText = `총 합계: ${total.toLocaleString()}원`;
    }

    function startDeliverySimulation() {
        if(localCart.length === 0) return;
        showSection('delivery-status-section');
        let p = 0;
        const inv = setInterval(() => {
            p += 25;
            document.getElementById('progress-bar').style.width = p + "%";
            if(p >= 100) { 
                clearInterval(inv); 
                document.getElementById('status-text').innerText = "배달 완료! 😋"; 
                localCart = []; 
                document.getElementById('cart-count').innerText = "0"; 
            }
        }, 1500);
    }

    function openModal(title, content, onConfirm) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal-confirm-btn').onclick = onConfirm;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    init();
</script>
</body>
</html>
