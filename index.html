<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가짜의 민족</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f6f6f6; }
        .baemin-navy { background-color: #2ac1bc; } 
        .hidden { display: none; }
    </style>
</head>
<body>

<header class="baemin-navy text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-4xl mx-auto flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div onclick="showSection('category-section')" class="text-xl font-black cursor-pointer tracking-tighter">가짜의 민족</div>
            <div class="flex gap-4 items-center">
                <div class="text-xs font-bold opacity-80">📍 서울특별시 ▼</div>
                <button onclick="showSection('cart-section')" class="relative text-sm font-bold">
                    🛒 장바구니 <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-[10px] rounded-full px-1">0</span>
                </button>
            </div>
        </div>
        <div class="relative">
            <input type="text" id="search-input" onkeyup="if(event.key === 'Enter') executeSearch()" placeholder="가게 이름을 검색해보세요!" class="w-full p-3 rounded-lg text-black focus:outline-none text-sm shadow-inner">
            <button onclick="executeSearch()" class="absolute right-3 top-3 text-gray-400">🔍</button>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4 mb-20">
    <section id="search-result-section" class="hidden">
        <div class="flex justify-between items-end mb-4 border-b pb-2">
            <h2 class="text-2xl font-black text-gray-800">검색 결과</h2>
            <button onclick="showSection('category-section')" class="text-gray-400 text-sm">닫기</button>
        </div>
        <div id="search-results-container" class="grid gap-4"></div>
    </section>

    <section id="category-section" class="grid grid-cols-4 gap-4 text-center mb-8"></section>

    <section id="restaurant-list-section" class="hidden">
        <div class="flex justify-between items-center mb-4">
            <h2 id="current-category-name" class="text-xl font-bold text-gray-800"></h2>
            <button onclick="showAddRestaurantModal()" class="bg-blue-500 text-white px-3 py-1 rounded text-sm">+ 음식점 추가</button>
        </div>
        <div id="restaurants-container" class="grid gap-4"></div>
        <button onclick="showSection('category-section')" class="mt-6 w-full py-3 border border-gray-300 rounded text-gray-500 bg-white font-bold">🏠 홈으로 돌아가기</button>
    </section>

    <section id="restaurant-detail-section" class="hidden">
        <div id="restaurant-info" class="bg-white p-6 rounded-t-xl shadow-sm mb-2 border-b"></div>
        
        <div id="menu-sub-categories" class="flex flex-col gap-4">
            <div class="bg-white p-4 shadow-sm">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg">🍔 일반메뉴</h3>
                    <button onclick="showAddMenuModal('normal')" class="text-blue-500 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-normal" class="grid gap-4"></div>
            </div>
            <div class="bg-white p-4 shadow-sm">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg">🍱 세트메뉴</h3>
                    <button onclick="showAddMenuModal('set')" class="text-blue-500 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-set" class="grid gap-4"></div>
            </div>
            <div class="bg-white p-4 shadow-sm mb-4">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg">🍟 사이드메뉴</h3>
                    <button onclick="showAddMenuModal('side')" class="text-blue-500 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-side" class="grid gap-4"></div>
            </div>
        </div>

        <div class="flex gap-2 p-4">
            <button onclick="showSection('restaurant-list-section')" class="flex-1 py-3 bg-gray-200 rounded font-bold text-gray-600">뒤로</button>
            <button onclick="showSection('category-section')" class="flex-1 py-3 border border-gray-300 bg-white rounded font-bold text-gray-500">🏠 홈으로</button>
        </div>
    </section>

    <section id="cart-section" class="hidden">
        <h2 class="text-xl font-bold mb-4">장바구니</h2>
        <div id="cart-items" class="bg-white p-4 rounded-lg shadow-sm mb-4"></div>
        <div id="cart-total" class="text-right font-bold text-lg mb-4 text-[#2ac1bc]"></div>
        <button onclick="startDeliverySimulation()" class="w-full py-4 baemin-navy text-white rounded-lg font-bold shadow-lg">주문하기</button>
    </section>

    <section id="delivery-status-section" class="hidden text-center p-10">
        <div class="text-5xl mb-4 animate-bounce">🛵</div>
        <h2 id="status-text" class="text-2xl font-bold mb-2 text-gray-800">주문 확인 중...</h2>
        <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden mb-8">
            <div id="progress-bar" class="baemin-navy h-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <button onclick="showSection('category-section')" class="w-full py-3 baemin-navy text-white rounded-lg font-bold">🏠 처음 화면으로</button>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100]">
    <div class="bg-white w-full max-w-md p-6 rounded-xl shadow-2xl">
        <h3 id="modal-title" class="text-lg font-bold mb-4 text-gray-800">입력</h3>
        <div id="modal-content" class="flex flex-col gap-3 max-h-[60vh] overflow-y-auto"></div>
        <div class="flex gap-2 mt-6">
            <button onclick="closeModal()" class="flex-1 py-2 bg-gray-200 rounded font-bold">취소</button>
            <button id="modal-confirm-btn" class="flex-1 py-2 baemin-navy text-white rounded font-bold">확인</button>
        </div>
    </div>
</div>

<script>
    const categories = ["분식", "고기", "치킨", "패스트푸드", "피자", "족발", "야식", "국·탕·찌개", "찜", "도시락", "카페·베이커리", "디저트", "한식", "중식", "일식", "동남아시아", "남아시아", "서아시아", "중앙아시아", "동유럽", "서유럽", "남유럽", "북유럽", "중유럽", "아프리카", "아메리칸", "남미", "북미", "오세아니아"];
    let db = JSON.parse(localStorage.getItem('deliveryDB_v3')) || { restaurants: [], cart: [] };
    let currentCategory = "";
    let currentRestaurantId = null;

    function init() {
        const catContainer = document.getElementById('category-section');
        catContainer.innerHTML = ""; 
        categories.forEach(cat => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl shadow-sm cursor-pointer hover:scale-105 transition-transform border border-transparent hover:border-[#2ac1bc]";
            div.innerHTML = `<div class="text-2xl mb-1">🍴</div><div class="text-xs font-bold text-gray-700">${cat}</div>`;
            div.onclick = () => showRestaurantList(cat);
            catContainer.appendChild(div);
        });
        updateCartCount();
    }

    function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        
        showSection('search-result-section');
        const container = document.getElementById('search-results-container');
        container.innerHTML = "";
        
        const filtered = db.restaurants.filter(r => r.name.includes(query));
        
        if(filtered.length === 0) {
            container.innerHTML = "<div class='text-center py-10 text-gray-400 font-bold'>검색 결과가 없습니다.</div>";
        } else {
            filtered.forEach(res => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-lg flex gap-4 cursor-pointer shadow-sm border border-gray-100";
                div.onclick = () => showRestaurantDetail(res.id);
                div.innerHTML = `<div class="w-16 h-16 bg-gray-50 rounded-lg flex items-center justify-center text-xl">🏠</div><div class="flex-1"><h3 class="font-bold text-gray-800">${res.name}</h3><p class="text-xs text-gray-400 mt-1">${res.category}</p></div>`;
                container.appendChild(div);
            });
        }
    }

    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        window.scrollTo(0,0);
        if(id === 'cart-section') renderCart();
    }

    function showRestaurantList(category) {
        currentCategory = category;
        showSection('restaurant-list-section');
        document.getElementById('current-category-name').innerText = category;
        renderRestaurants();
    }

    function renderRestaurants() {
        const container = document.getElementById('restaurants-container');
        container.innerHTML = "";
        const list = db.restaurants.filter(r => r.category === currentCategory);
        list.forEach(res => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-lg flex gap-4 cursor-pointer shadow-sm border border-gray-100";
            div.onclick = () => showRestaurantDetail(res.id);
            // 배달팁 0원 -> 4000원 수정
            div.innerHTML = `<div class="w-16 h-16 bg-gray-50 rounded-lg flex items-center justify-center text-xl">🏠</div><div><h3 class="font-bold text-gray-800">${res.name}</h3><p class="text-xs text-gray-400 mt-1">⭐ 5.0 | 배달팁 4,000원</p></div>`;
            container.appendChild(div);
        });
    }

    function showRestaurantDetail(id) {
        currentRestaurantId = id;
        const res = db.restaurants.find(r => r.id === id);
        showSection('restaurant-detail-section');
        document.getElementById('restaurant-info').innerHTML = `<h2 class="text-2xl font-bold text-gray-800">${res.name}</h2><p class="text-sm text-gray-500 mt-2 font-bold">원하시는 메뉴와 옵션을 선택해주세요.</p>`;
        renderMenus(res);
    }

    function updateItemQty(cat, idx, change) {
        const span = document.getElementById(`qty-${cat}-${idx}`);
        let current = parseInt(span.innerText);
        current = Math.max(1, current + change);
        span.innerText = current;
    }

    function renderMenus(res) {
        const subCats = ['normal', 'set', 'side'];
        subCats.forEach(cat => {
            const container = document.getElementById(`menu-container-${cat}`);
            container.innerHTML = "";
            const menus = res.menus[cat] || [];
            
            menus.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "p-4 border rounded-xl bg-gray-50/30 mb-2";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div class="flex gap-3">
                            ${m.img ? `<img src="${m.img}" class="w-16 h-16 object-cover rounded-lg shadow-sm">` : `<div class="w-16 h-16 bg-gray-200 rounded-lg"></div>`}
                            <div>
                                <p class="font-bold text-gray-700">${m.name}</p>
                                <p class="text-sm text-[#2ac1bc] font-bold">${parseInt(m.price).toLocaleString()}원</p>
                            </div>
                        </div>
                        <div class="flex flex-col gap-1">
                            <button onclick="showOptionManageModal('${cat}', ${idx})" class="text-[10px] px-2 py-1 border border-gray-300 rounded-md bg-white text-gray-500 font-bold hover:bg-gray-50">옵션 관리</button>
                            <div class="flex gap-1">
                                <button onclick="showEditMenuModal('${cat}', ${idx})" class="text-[10px] px-2 py-1 border border-blue-200 rounded-md bg-white text-blue-500 font-bold hover:bg-blue-50">수정</button>
                                <button onclick="deleteMenu('${cat}', ${idx})" class="text-[10px] px-2 py-1 border border-red-200 rounded-md bg-white text-red-500 font-bold hover:bg-red-50">삭제</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-100">
                        <div class="flex items-center gap-3 border rounded-full px-3 py-1 bg-white shadow-sm">
                            <button onclick="updateItemQty('${cat}', ${idx}, -1)" class="font-bold text-gray-300">-</button>
                            <span id="qty-${cat}-${idx}" class="text-xs font-bold w-4 text-center">1</span>
                            <button onclick="updateItemQty('${cat}', ${idx}, 1)" class="font-bold text-[#2ac1bc]">+</button>
                        </div>
                        <button onclick="prepareAddToCart('${cat}', ${idx})" class="px-5 py-2 baemin-navy text-white text-xs font-bold rounded-full shadow-md">장바구니 담기</button>
                    </div>`;
                container.appendChild(div);
            });
        });
    }

    // --- 메뉴 수정 기능 추가 ---
    function showEditMenuModal(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        
        openModal("메뉴 수정", `
            <input id="edit-menu-name" type="text" value="${menu.name}" placeholder="메뉴 이름" class="w-full border p-2 rounded text-sm mb-2">
            <input id="edit-menu-price" type="number" value="${menu.price}" placeholder="가격" class="w-full border p-2 rounded text-sm mb-2">
            <input id="edit-menu-img" type="text" value="${menu.img || ''}" placeholder="이미지 URL" class="w-full border p-2 rounded text-sm">
        `, () => {
            const newName = document.getElementById('edit-menu-name').value;
            const newPrice = parseInt(document.getElementById('edit-menu-price').value) || 0;
            const newImg = document.getElementById('edit-menu-img').value;
            
            if(!newName) return;
            menu.name = newName;
            menu.price = newPrice;
            menu.img = newImg;
            
            saveDB();
            renderMenus(res);
            closeModal();
        });
    }

    // --- 메뉴 삭제 기능 추가 ---
    function deleteMenu(cat, idx) {
        if(confirm("이 메뉴를 삭제하시겠습니까?")) {
            const res = db.restaurants.find(r => r.id === currentRestaurantId);
            res.menus[cat].splice(idx, 1);
            saveDB();
            renderMenus(res);
        }
    }

    function showOptionManageModal(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        if(!menu.options) menu.options = [];

        let listHtml = menu.options.map((opt, oIdx) => `
            <div class="flex justify-between items-center bg-gray-100 p-2 rounded text-sm">
                <span>${opt.name} (+${opt.price.toLocaleString()}원)</span>
                <button onclick="removeOption('${cat}', ${idx}, ${oIdx})" class="text-red-500 font-bold">×</button>
            </div>
        `).join('');

        openModal(`[${menu.name}] 옵션 관리`, `
            <div class="flex flex-col gap-2 mb-4">${listHtml || '<p class="text-center text-gray-400 text-xs py-2">등록된 옵션이 없습니다.</p>'}</div>
            <div class="border-t pt-4">
                <input id="opt-name" type="text" placeholder="옵션명 (예: 치즈추가)" class="w-full border p-2 rounded text-sm mb-2">
                <input id="opt-price" type="number" placeholder="추가금액 (숫자)" class="w-full border p-2 rounded text-sm">
            </div>
        `, () => {
            const name = document.getElementById('opt-name').value;
            const price = parseInt(document.getElementById('opt-price').value) || 0;
            if(!name) return closeModal();
            menu.options.push({ name, price });
            saveDB();
            showOptionManageModal(cat, idx);
        });
    }

    function removeOption(cat, idx, oIdx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        res.menus[cat][idx].options.splice(oIdx, 1);
        saveDB();
        showOptionManageModal(cat, idx);
    }

    function prepareAddToCart(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        const qty = parseInt(document.getElementById(`qty-${cat}-${idx}`).innerText);

        if(!menu.options || menu.options.length === 0) {
            addToCartWithFinalInfo(res.name, menu.name, menu.price, qty, []);
            return;
        }

        openModal("옵션 선택", `
            <p class="text-sm font-bold mb-3">${menu.name}를 더 맛있게!</p>
            <div class="flex flex-col gap-2">
                ${menu.options.map((opt, i) => `
                    <label class="flex justify-between items-center p-3 border rounded-lg cursor-pointer hover:bg-gray-50">
                        <span class="text-sm">${opt.name} (+${opt.price.toLocaleString()}원)</span>
                        <input type="checkbox" name="menu-opt" value="${i}" class="w-4 h-4 accent-[#2ac1bc]">
                    </label>
                `).join('')}
            </div>
        `, () => {
            const selectedIdxs = Array.from(document.querySelectorAll('input[name="menu-opt"]:checked')).map(el => parseInt(el.value));
            const selectedOpts = selectedIdxs.map(i => menu.options[i]);
            addToCartWithFinalInfo(res.name, menu.name, menu.price, qty, selectedOpts);
        });
    }

    function addToCartWithFinalInfo(resName, menuName, basePrice, qty, selectedOpts) {
        const optPrice = selectedOpts.reduce((sum, o) => sum + o.price, 0);
        const optText = selectedOpts.map(o => o.name).join(', ') || '없음';
        const finalPrice = basePrice + optPrice;

        for(let i=0; i<qty; i++) {
            db.cart.push({ resName, menuName, price: finalPrice, optionsText: optText });
        }
        saveDB(); updateCartCount(); closeModal();
        alert(`${menuName} ${qty}개를 담았습니다.`);
    }

    function showAddRestaurantModal() {
        openModal("가게 등록", `<input id="new-res-name" type="text" placeholder="식당 이름을 입력하세요" class="w-full border p-3 rounded-lg text-sm">`, () => {
            const name = document.getElementById('new-res-name').value;
            if(!name) return;
            db.restaurants.push({ id: Date.now(), category: currentCategory, name: name, menus: { normal: [], set: [], side: [] } });
            saveDB(); renderRestaurants(); closeModal();
        });
    }

    function showAddMenuModal(type) {
        openModal("메뉴 등록", `
            <input id="new-menu-name" type="text" placeholder="메뉴 이름" class="w-full border p-2 rounded text-sm mb-2">
            <input id="new-menu-price" type="number" placeholder="가격" class="w-full border p-2 rounded text-sm mb-2">
            <input id="new-menu-img" type="text" placeholder="이미지 URL" class="w-full border p-2 rounded text-sm">
        `, () => {
            const name = document.getElementById('new-menu-name').value;
            const price = parseInt(document.getElementById('new-menu-price').value) || 0;
            const img = document.getElementById('new-menu-img').value;
            if(!name) return;
            const res = db.restaurants.find(r => r.id === currentRestaurantId);
            res.menus[type].push({ name, price, img, options: [] });
            saveDB(); renderMenus(res); closeModal();
        });
    }

    function updateCartCount() {
        document.getElementById('cart-count').innerText = db.cart.length;
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalDiv = document.getElementById('cart-total');
        container.innerHTML = "";
        let total = 0;
        if(db.cart.length === 0) container.innerHTML = "<p class='text-center py-10 text-gray-400'>장바구니가 비어있습니다.</p>";
        db.cart.forEach((item) => {
            total += item.price;
            container.innerHTML += `
                <div class="py-3 border-b border-gray-50 last:border-0">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] text-gray-400 font-bold">${item.resName}</p>
                            <p class="font-bold text-gray-800">${item.menuName}</p>
                            <p class="text-[10px] text-blue-400 font-bold">옵션: ${item.optionsText}</p>
                        </div>
                        <p class="font-bold text-sm text-gray-700">${item.price.toLocaleString()}원</p>
                    </div>
                </div>`;
        });
        totalDiv.innerText = `총 결제금액: ${total.toLocaleString()}원`;
    }

    function startDeliverySimulation() {
        if(db.cart.length === 0) return alert("장바구니가 비어있습니다.");
        showSection('delivery-status-section');
        const steps = ["주문 확인 중...", "음식 준비 중...", "라이더 배정 중...", "집으로 오고 있어요!", "배달 완료! 😋"];
        let currentStep = 0;
        const interval = setInterval(() => {
            currentStep++;
            const progress = (currentStep / (steps.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('status-text').innerText = steps[currentStep];
            if(currentStep >= steps.length - 1) {
                clearInterval(interval);
                db.cart = []; saveDB(); updateCartCount();
            }
        }, 2000);
    }

    function saveDB() { localStorage.setItem('deliveryDB_v3', JSON.stringify(db)); }
    function openModal(title, content, onConfirm) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal-confirm-btn').onclick = onConfirm;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    init();
</script>

</body>
</html>
