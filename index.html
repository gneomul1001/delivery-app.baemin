<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가짜의 민족</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f6f6f6; }
        .baemin-navy { background-color: #2ac1bc; } 
        .hidden { display: none; }
        /* 드래그 앤 드롭 강조 스타일 */
        .drag-over { background-color: #e0f2f1 !important; border: 2px dashed #2ac1bc !important; }
    </style>
</head>
<body class="antialiased text-gray-800">

<header class="baemin-navy text-white p-4 sticky top-0 z-50 shadow-md">
    <div class="max-w-4xl mx-auto flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <div onclick="showSection('category-section')" class="text-xl font-black cursor-pointer tracking-tighter select-none">가짜의 민족</div>
            <div class="flex gap-4 items-center">
                <div class="text-xs font-bold opacity-80">📍 서울특별시 ▼</div>
                <button onclick="showSection('cart-section')" class="relative text-sm font-bold bg-black/10 px-2.5 py-1.5 rounded-lg hover:bg-black/20 transition-colors">
                    🛒 장바구니 <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-[10px] rounded-full px-1.5 min-w-[18px] h-[18px] flex items-center justify-center font-black">0</span>
                </button>
            </div>
        </div>
        <div class="relative">
            <input type="text" id="search-input" onkeyup="if(event.key === 'Enter') executeSearch()" placeholder="가게 이름을 검색해보세요!" class="w-full p-3 pr-10 rounded-lg text-black focus:outline-none text-sm shadow-inner placeholder-gray-400">
            <button onclick="executeSearch()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 transition-colors">🔍</button>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto p-4 mb-20">
    <section id="search-result-section" class="hidden">
        <div class="flex justify-between items-end mb-4 border-b pb-2">
            <h2 class="text-2xl font-black text-gray-800">검색 결과</h2>
            <button onclick="showSection('category-section')" class="text-gray-400 hover:text-gray-600 text-sm font-bold">닫기</button>
        </div>
        <div id="search-results-container" class="grid gap-4"></div>
    </section>

    <section id="category-management-section" class="mb-4 bg-white p-4 rounded-xl shadow-sm flex flex-col sm:flex-row justify-between items-center gap-3">
        <span class="text-sm font-bold text-gray-700">원하는 카테고리를 관리해보세요</span>
        <div class="flex gap-2 w-full sm:w-auto">
            <button onclick="addNewGlobalCategoryDirect()" class="flex-1 sm:flex-none bg-amber-500 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-amber-600 transition-colors">➕ 카테고리 추가</button>
            <button onclick="showDeleteGlobalCategoryModal()" class="flex-1 sm:flex-none bg-red-500 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-sm hover:bg-red-600 transition-colors">❌ 카테고리 삭제</button>
        </div>
    </section>
    
    <section id="category-section" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3 text-center mb-8"></section>

    <section id="restaurant-list-section" class="hidden">
        <div class="flex justify-between items-center mb-4 gap-2">
            <h2 id="current-category-name" class="text-xl font-black text-gray-800 break-all"></h2>
            <button id="add-item-btn" onclick="showAddRestaurantModal()" class="shrink-0 bg-blue-500 hover:bg-blue-600 transition-colors text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm"></button>
        </div>

        <div id="mart-main-filter-container" class="bg-white p-4 shadow-sm rounded-lg mb-4 hidden flex flex-col gap-3">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                <span class="text-xs text-gray-400 font-bold">* 분류 버튼을 눌러 원하는 상품 카테고리만 확인하세요.</span>
                <div class="flex gap-1 w-full sm:w-auto justify-end">
                    <button onclick="addNewMartCategoryDirect()" class="bg-amber-500 text-white px-2 py-1 rounded text-xs font-bold shadow-sm hover:bg-amber-600 transition-colors">➕ 추가</button>
                    <button onclick="showEditMartCategoryModal()" class="bg-blue-500 text-white px-2 py-1 rounded text-xs font-bold shadow-sm hover:bg-blue-600 transition-colors">✏️ 수정</button>
                    <button onclick="showDeleteMartCategoryModal()" class="bg-red-500 text-white px-2 py-1 rounded text-xs font-bold shadow-sm hover:bg-red-600 transition-colors">❌ 삭제</button>
                </div>
            </div>
            <div id="mart-main-category-buttons" class="flex flex-wrap gap-2 pt-2 border-t border-gray-100"></div>
        </div>

        <div id="restaurants-container" class="grid gap-4"></div>
        <button onclick="showSection('category-section')" class="mt-6 w-full py-3 border border-gray-300 rounded-xl text-gray-500 bg-white font-bold hover:bg-gray-50 transition-colors">🏠 홈으로 돌아가기</button>
    </section>

    <section id="restaurant-detail-section" class="hidden">
        <div id="restaurant-info" class="bg-white p-6 rounded-t-xl shadow-sm mb-2 border-b"></div>
        
        <div id="mart-product-container" class="flex flex-col gap-4 hidden">
            <div id="mart-items-list-box" class="grid gap-4"></div>
        </div>

        <div id="menu-sub-categories" class="flex flex-col gap-4">
            <div class="bg-white p-4 shadow-sm rounded-xl">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg text-gray-800">🍔 일반메뉴</h3>
                    <button onclick="showAddMenuModal('normal')" class="text-blue-500 hover:text-blue-700 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-normal" class="grid gap-4"></div>
            </div>
            <div class="bg-white p-4 shadow-sm rounded-xl">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg text-gray-800">🍱 세트메뉴</h3>
                    <button onclick="showAddMenuModal('set')" class="text-blue-500 hover:text-blue-700 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-set" class="grid gap-4"></div>
            </div>
            <div class="bg-white p-4 shadow-sm rounded-xl mb-4">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-lg text-gray-800">🍟 사이드메뉴</h3>
                    <button onclick="showAddMenuModal('side')" class="text-blue-500 hover:text-blue-700 text-sm font-bold">+ 등록</button>
                </div>
                <div id="menu-container-side" class="grid gap-4"></div>
            </div>
        </div>

        <div class="flex gap-2 p-4">
            <button onclick="showSection('restaurant-list-section')" class="flex-1 py-3 bg-gray-200 rounded-xl font-bold text-gray-600 hover:bg-gray-300 transition-colors">뒤로</button>
            <button onclick="showSection('category-section')" class="flex-1 py-3 border border-gray-300 bg-white rounded-xl font-bold text-gray-500 hover:bg-gray-50 transition-colors">🏠 홈으로</button>
        </div>
    </section>

    <section id="cart-section" class="hidden">
        <h2 class="text-xl font-bold mb-4 text-gray-800">장바구니</h2>
        <div id="cart-items" class="bg-white p-4 rounded-xl shadow-sm mb-4"></div>
        <div id="cart-total" class="text-right font-bold text-lg mb-4 text-[#2ac1bc]"></div>
        <button onclick="startDeliverySimulation()" class="w-full py-4 baemin-navy text-white rounded-xl font-bold shadow-lg hover:opacity-90 active:scale-[0.99] transition-all">주문하기</button>
    </section>

    <section id="delivery-status-section" class="hidden text-center p-10 bg-white rounded-xl shadow-sm">
        <div class="text-5xl mb-4 animate-bounce">🛵</div>
        <h2 id="status-text" class="text-2xl font-bold mb-2 text-gray-800">주문 확인 중...</h2>
        <div class="w-full bg-gray-200 h-3 rounded-full overflow-hidden mb-8 max-w-md mx-auto">
            <div id="progress-bar" class="baemin-navy h-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <button onclick="showSection('category-section')" class="w-full max-w-md py-3 baemin-navy text-white rounded-xl font-bold hover:opacity-90 transition-opacity">🏠 처음 화면으로</button>
    </section>
</main>

<div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100] animate-fade-in">
    <div class="bg-white w-full max-w-md p-6 rounded-xl shadow-2xl flex flex-col max-h-[90vh]">
        <h3 id="modal-title" class="text-lg font-bold mb-4 text-gray-800 shrink-0">입력</h3>
        <div id="modal-content" class="flex flex-col gap-3 overflow-y-auto pr-1 text-sm text-gray-600 flex-1"></div>
        <div class="flex gap-2 mt-6 shrink-0">
            <button onclick="closeModal()" class="flex-1 py-2.5 bg-gray-200 hover:bg-gray-300 transition-colors rounded-lg font-bold text-gray-700">취소</button>
            <button id="modal-confirm-btn" class="flex-1 py-2.5 baemin-navy text-white hover:opacity-90 transition-opacity rounded-lg font-bold">확인</button>
        </div>
    </div>
</div>

<script>
    const defaultGlobalCategories = ["가민G마트", "분식", "고기", "치킨", "패스트푸드", "피자", "족발", "야식", "국·탕·찌개", "찜", "도시락", "카페·베이커리", "디저트", "고급요리", "한식", "중식", "일식", "동남아시아", "남아시아", "서아시아", "중앙아시아", "동유럽", "서유럽", "남유럽", "북유럽", "중유럽", "동아프리카", "서아프리카", "남아프리카", "북아프리카", "미국", "북미", "남미", "카리브해", "오세아니아", "호주", "뉴질랜드"];
    
    let db = JSON.parse(localStorage.getItem('deliveryDB_v4')) || { 
        restaurants: [], 
        cart: [], 
        globalMartCategories: ["식료품", "생활용품", "신선식품"],
        globalCategories: defaultGlobalCategories
    };

    if(!db.globalCategories) {
        db.globalCategories = defaultGlobalCategories;
        localStorage.setItem('deliveryDB_v4', JSON.stringify(db));
    }

    let currentCategory = "";
    let currentRestaurantId = null;
    let selectedMartFilter = "all"; 

    function init() {
        renderGlobalCategories();
        updateCartCount();
    }

    function renderGlobalCategories() {
        const catContainer = document.getElementById('category-section');
        catContainer.innerHTML = ""; 
        
        db.globalCategories.forEach(cat => {
            const div = document.createElement('div');
            div.className = "bg-white p-3 sm:p-4 rounded-xl shadow-sm cursor-pointer hover:scale-105 transition-transform border border-transparent hover:border-[#2ac1bc] flex flex-col justify-center items-center min-h-[85px] select-none";
            const icon = cat === "가민G마트" ? "🛒" : "🍴";
            div.innerHTML = `<div class="text-xl sm:text-2xl mb-1">${icon}</div><div class="text-[11px] sm:text-xs font-bold text-gray-700 break-all line-clamp-2 px-0.5">${cat}</div>`;
            div.onclick = () => showRestaurantList(cat);
            catContainer.appendChild(div);
        });
    }

    function addNewGlobalCategoryDirect() {
        const newCatName = prompt("새롭게 추가할 대분류 카테고리명을 입력하세요:");
        if (newCatName && newCatName.trim() !== "") {
            const trimmedName = newCatName.trim();
            if (!db.globalCategories.includes(trimmedName)) {
                db.globalCategories.push(trimmedName);
                saveDB();
                renderGlobalCategories();
            } else {
                alert("이미 존재하는 카테고리 이름입니다.");
            }
        }
    }

    function showDeleteGlobalCategoryModal() {
        if (!db.globalCategories || db.globalCategories.length === 0) return alert("삭제할 카테고리가 없습니다.");
        
        let optionsHtml = db.globalCategories.map((c, i) => `<option value="${i}">${c}</option>`).join('');
        
        openModal("대분류 카테고리 삭제", `
            <p class="text-xs text-red-500 font-bold mb-2">* 주의: 카테고리가 삭제되면 소속되어 있던 모든 음식점 및 상품 데이터가 함께 영구 삭제됩니다.</p>
            <div>
                <label class="text-xs text-gray-500 font-bold mb-1 block">삭제할 카테고리 선택</label>
                <select id="delete-global-cat-index" class="w-full border p-2 rounded text-sm bg-white">${optionsHtml}</select>
            </div>
        `, () => {
            const idx = parseInt(document.getElementById('delete-global-cat-index').value);
            const targetCategoryName = db.globalCategories[idx];
            
            if (confirm(`[${targetCategoryName}] 카테고리와 소속된 모든 상점/상품 데이터를 완전히 삭제하시겠습니까?`)) {
                db.restaurants = db.restaurants.filter(r => r.category !== targetCategoryName);
                db.globalCategories.splice(idx, 1);
                saveDB();
                renderGlobalCategories();
            }
            closeModal();
        });
    }

    function handleImageDrop(e, inputId) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById(inputId).value = event.target.result;
            };
            reader.readAsDataURL(file);
        }
    }

    function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
    function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

    function executeSearch() {
        const query = document.getElementById('search-input').value.trim();
        if(!query) return;
        
        showSection('search-result-section');
        const container = document.getElementById('search-results-container');
        container.innerHTML = "";
        
        const filtered = db.restaurants.filter(r => r.name.includes(query));
        
        if(filtered.length === 0) {
            container.innerHTML = "<div class='text-center py-10 text-gray-400 font-bold'>검색 결과가 없습니다.</div>";
        } else {
            filtered.forEach(res => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl flex gap-4 cursor-pointer shadow-sm border border-gray-100 hover:border-gray-200 transition-colors";
                div.onclick = () => showRestaurantDetail(res.id);
                div.innerHTML = `<div class="w-16 h-16 bg-gray-50 rounded-lg flex items-center justify-center text-xl shrink-0">🏠</div><div class="flex-1 min-w-0"><h3 class="font-bold text-gray-800 truncate">${res.name}</h3><p class="text-xs text-gray-400 mt-1">${res.category}</p></div>`;
                container.appendChild(div);
            });
        }
    }

    function showSection(id) {
        document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        
        if(id === 'category-section') {
            document.getElementById('category-management-section').classList.remove('hidden');
        } else {
            document.getElementById('category-management-section').classList.add('hidden');
        }
        
        window.scrollTo(0,0);
        if(id === 'cart-section') renderCart();
    }

    function showRestaurantList(category) {
        currentCategory = category;
        showSection('restaurant-list-section');
        document.getElementById('current-category-name').innerText = category;
        
        const filterBox = document.getElementById('mart-main-filter-container');
        if (category === "가민G마트") {
            filterBox.classList.remove('hidden');
            selectedMartFilter = "all"; 
            renderMartMainCategoryButtons();
        } else {
            filterBox.classList.add('hidden');
        }
        
        renderRestaurants();
    }

    function renderMartMainCategoryButtons() {
        const btnContainer = document.getElementById('mart-main-category-buttons');
        btnContainer.innerHTML = "";

        if(!db.globalMartCategories) db.globalMartCategories = ["식료품", "생활용품", "신선식품"];

        const allBtn = document.createElement('button');
        allBtn.className = `px-3 py-1.5 rounded-full text-xs font-bold transition-all ${selectedMartFilter === 'all' ? 'bg-[#2ac1bc] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
        allBtn.innerText = "✨ 전체보기";
        allBtn.onclick = () => { selectedMartFilter = "all"; renderMartMainCategoryButtons(); renderRestaurants(); };
        btnContainer.appendChild(allBtn);

        db.globalMartCategories.forEach(catName => {
            const btn = document.createElement('button');
            btn.className = `px-3 py-1.5 rounded-full text-xs font-bold transition-all ${selectedMartFilter === catName ? 'bg-[#2ac1bc] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
            btn.innerText = `📁 ${catName}`;
            btn.onclick = () => { selectedMartFilter = catName; renderMartMainCategoryButtons(); renderRestaurants(); };
            btnContainer.appendChild(btn);
        });

        const uncatBtn = document.createElement('button');
        uncatBtn.className = `px-3 py-1.5 rounded-full text-xs font-bold transition-all ${selectedMartFilter === 'unclassified' ? 'bg-[#2ac1bc] text-white shadow-sm' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`;
        uncatBtn.innerText = "⚠️ 미분류 상품";
        uncatBtn.onclick = () => { selectedMartFilter = "unclassified"; renderMartMainCategoryButtons(); renderRestaurants(); };
        btnContainer.appendChild(uncatBtn);
    }

    function addNewMartCategoryDirect() {
        const newCatName = prompt("새롭게 추가 지정할 마트 카테고리명을 직접 입력하세요:");
        if(newCatName && newCatName.trim() !== "") {
            if(!db.globalMartCategories.includes(newCatName.trim())) {
                db.globalMartCategories.push(newCatName.trim());
                saveDB();
                renderMartMainCategoryButtons();
            } else {
                alert("이미 존재하는 분류 카테고리입니다.");
            }
        }
    }

    function showEditMartCategoryModal() {
        if(!db.globalMartCategories || db.globalMartCategories.length === 0) return alert("수정할 카테고리가 없습니다.");
        
        let optionsHtml = db.globalMartCategories.map((c, i) => `<option value="${i}">${c}</option>`).join('');
        
        openModal("마트 카테고리 명칭 수정", `
            <div class="mb-3">
                <label class="text-xs text-gray-500 font-bold mb- block">수정할 카테고리 선택</label>
                <select id="edit-cat-index" class="w-full border p-2 rounded text-sm bg-white">${optionsHtml}</select>
            </div>
            <div>
                <label class="text-xs text-gray-500 font-bold mb-1 block">새로운 카테고리 명칭 직접 입력</label>
                <input id="edit-cat-new-name" type="text" placeholder="변경할 명칭 입력" class="w-full border p-2 rounded text-sm">
            </div>
        `, () => {
            const idx = parseInt(document.getElementById('edit-cat-index').value);
            const newName = document.getElementById('edit-cat-new-name').value.trim();
            
            if(!newName) return alert("카테고리 이름을 입력해야 합니다.");
            
            const oldName = db.globalMartCategories[idx];
            
            db.restaurants.forEach(r => {
                if(r.category === "가민G마트" && r.martCategory === oldName) {
                    r.martCategory = newName;
                }
            });
            
            db.globalMartCategories[idx] = newName;
            selectedMartFilter = "all"; 
            saveDB();
            renderMartMainCategoryButtons();
            renderRestaurants();
            closeModal();
        });
    }

    function showDeleteMartCategoryModal() {
        if(!db.globalMartCategories || db.globalMartCategories.length === 0) return alert("삭제할 카테고리가 없습니다.");
        
        let optionsHtml = db.globalMartCategories.map((c, i) => `<option value="${i}">${c}</option>`).join('');
        
        openModal("마트 카테고리 삭제", `
            <p class="text-xs text-red-500 font-bold mb-2">* 해당 카테고리가 삭제되면 소속 상품들은 자동으로 [미분류] 지정 처리됩니다.</p>
            <div>
                <label class="text-xs text-gray-500 font-bold mb-1 block">삭제할 카테고리 선택</label>
                <select id="delete-cat-index" class="w-full border p-2 rounded text-sm bg-white">${optionsHtml}</select>
            </div>
        `, () => {
            const idx = parseInt(document.getElementById('delete-cat-index').value);
            const targetName = db.globalMartCategories[idx];
            
            if(confirm(`[${targetName}] 카테고리를 완전히 삭제하시겠습니까?`)) {
                db.restaurants.forEach(r => {
                    if(r.category === "가민G마트" && r.martCategory === targetName) {
                        r.martCategory = "";
                    }
                });
                
                db.globalMartCategories.splice(idx, 1);
                selectedMartFilter = "all"; 
                saveDB();
                renderMartMainCategoryButtons();
                renderRestaurants();
            }
            closeModal();
        });
    }

    function renderRestaurants() {
        const container = document.getElementById('restaurants-container');
        container.innerHTML = "";
        
        const addBtn = document.getElementById('add-item-btn');
        if (currentCategory === "가민G마트") {
            addBtn.innerText = "+ 상품 추가";
        } else {
            addBtn.innerText = "+ 음식점 추가";
        }

        let list = db.restaurants.filter(r => r.category === currentCategory);

        if (currentCategory === "가민G마트") {
            if (selectedMartFilter === "unclassified") {
                list = list.filter(res => !res.martCategory || !db.globalMartCategories.includes(res.martCategory));
            } else if (selectedMartFilter !== "all") {
                list = list.filter(res => res.martCategory === selectedMartFilter);
            }
        }

        if (list.length === 0) {
            const msg = currentCategory === "가민G마트" ? "해당 카테고리에 일치하는 등록 상품이 없습니다." : "등록된 음식점이 없습니다. 첫 음식점을 추가해보세요!";
            container.innerHTML = `<div class="bg-white p-8 text-center text-gray-400 text-sm rounded-xl border border-dashed">${msg}</div>`;
            return;
        }

        list.forEach(res => {
            const div = document.createElement('div');
            div.className = "bg-white p-4 rounded-xl flex gap-4 cursor-pointer shadow-sm border border-gray-100 items-center justify-between hover:border-gray-200 transition-colors flex-col sm:flex-row text-left w-full";
            
            const infoDiv = document.createElement('div');
            infoDiv.className = "flex gap-4 flex-1 items-center w-full min-w-0";
            infoDiv.onclick = () => showRestaurantDetail(res.id);
            
            const imgHtml = (res.img) 
                ? `<img src="${res.img}" class="w-16 h-16 object-cover rounded-lg shadow-sm shrink-0">` 
                : `<div class="w-16 h-16 bg-gray-50 rounded-lg flex items-center justify-center text-xl shrink-0">${currentCategory === '가민G마트' ? '📦' : '🏠'}</div>`;
                
            const martCatLabel = (currentCategory === "가민G마트" && res.martCategory) ? ` [${res.martCategory}]` : ' [미분류]';
            const subText = currentCategory === "가민G마트" ? `가격: ${(res.price || 0).toLocaleString()}원` : "⭐ 5.0 | 배달팁 4,000원";
            
            infoDiv.innerHTML = `${imgHtml}<div class="min-w-0 flex-1"><h3 class="font-bold text-gray-800 truncate">${res.name}<span class="text-xs text-blue-500 font-normal">${currentCategory === "가민G마트" ? martCatLabel : ''}</span></h3><p class="text-xs text-gray-400 mt-1">${subText}</p></div>`;
            div.appendChild(infoDiv);

            const btnGroup = document.createElement('div');
            btnGroup.className = "flex gap-1 w-full sm:w-auto justify-end mt-2 sm:mt-0 pt-2 sm:pt-0 border-t sm:border-0 border-gray-50 relative z-10 shrink-0";
            
            if(currentCategory === "가민G마트") {
                btnGroup.innerHTML = `
                    <button onclick="showEditMartItemModal(${res.id})" class="text-[11px] px-2.5 py-1.5 border border-blue-200 rounded-md bg-white text-blue-500 font-bold hover:bg-blue-50">수정</button>
                    <button onclick="deleteMartItem(${res.id})" class="text-[11px] px-2.5 py-1.5 border border-red-200 rounded-md bg-white text-red-500 font-bold hover:bg-red-50">삭제</button>
                `;
            } else {
                btnGroup.innerHTML = `
                    <button onclick="showEditRestaurantModal(${res.id})" class="text-[11px] px-2.5 py-1.5 border border-blue-200 rounded-md bg-white text-blue-500 font-bold hover:bg-blue-50">수정</button>
                    <button onclick="deleteRestaurant(${res.id})" class="text-[11px] px-2.5 py-1.5 border border-red-200 rounded-md bg-white text-red-500 font-bold hover:bg-red-50">삭제</button>
                `;
            }
            div.appendChild(btnGroup);
            container.appendChild(div);
        });
    }

    function showEditRestaurantModal(id) {
        const res = db.restaurants.find(r => r.id === id);
        if(!res) return;

        openModal("음식점 정보 수정", `
            <label class="text-xs text-gray-500 font-bold mb-1 block">음식점 이름</label>
            <input id="edit-res-name" type="text" value="${res.name}" placeholder="식당 이름을 입력하세요" class="w-full border p-3 rounded-lg text-sm">
        `, () => {
            const newName = document.getElementById('edit-res-name').value.trim();
            if(!newName) return alert("식당 이름을 입력해주세요.");
            
            res.name = newName;
            saveDB();
            renderRestaurants();
            closeModal();
        });
    }

    function deleteRestaurant(id) {
        const res = db.restaurants.find(r => r.id === id);
        if(!res) return;

        if(confirm(`[${res.name}] 음식점을 완전히 삭제하시겠습니까?\n등록된 하위 메뉴 데이터도 함께 유실됩니다.`)) {
            db.restaurants = db.restaurants.filter(r => r.id !== id);
            saveDB();
            renderRestaurants();
        }
    }

    function showEditMartItemModal(id) {
        const item = db.restaurants.find(r => r.id === id);
        if(!db.globalMartCategories) db.globalMartCategories = ["식료품", "생활용품", "신선식품"];

        let selectOptionsHtml = `<option value="">-- 카테고리 선택 없음 (미분류) --</option>`;
        selectOptionsHtml += db.globalMartCategories.map(c => `
            <option value="${c}" ${item.martCategory === c ? 'selected' : ''}>${c}</option>
        `).join('');

        openModal("상품 정보 수정", `
            <p class="text-[10px] text-blue-500 font-bold mb-1">* 이미지 파일을 아래 입력창으로 끌어다 놓으세요</p>
            <input id="edit-mart-name" type="text" value="${item.name}" placeholder="상품 명칭" class="w-full border p-2 rounded text-sm mb-2">
            <div class="mb-2">
                <label class="text-xs text-gray-500 font-bold mb-1 block">소속 지정 카테고리</label>
                <select id="edit-mart-cat-select" class="w-full border p-2 rounded text-sm bg-white">${selectOptionsHtml}</select>
            </div>
            <input id="edit-mart-price" type="number" value="${item.price || 0}" placeholder="판매 가격" class="w-full border p-2 rounded text-sm mb-2">
            <input id="edit-mart-img" type="text" value="${item.img || ''}" placeholder="이미지 URL 주소 또는 파일 드래그" 
                class="w-full border p-2 rounded text-sm bg-gray-50 focus:bg-white transition-colors"
                ondrop="handleImageDrop(event, 'edit-mart-img')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
        `, () => {
            const newName = document.getElementById('edit-mart-name').value;
            const newCat = document.getElementById('edit-mart-cat-select').value;
            const newPrice = parseInt(document.getElementById('edit-mart-price').value) || 0;
            const newImg = document.getElementById('edit-mart-img').value;

            if(!newName) return;
            item.name = newName;
            item.martCategory = newCat;
            item.price = newPrice;
            item.img = newImg;

            saveDB();
            renderRestaurants();
            closeModal();
        });
    }

    function deleteMartItem(id) {
        if(confirm("이 상품을 삭제하시겠습니까?")) {
            db.restaurants = db.restaurants.filter(r => r.id !== id);
            saveDB();
            renderRestaurants();
        }
    }

    function showRestaurantDetail(id) {
        currentRestaurantId = id;
        const res = db.restaurants.find(r => r.id === id);
        if(!res) return;
        showSection('restaurant-detail-section');
        
        const infoArea = document.getElementById('restaurant-info');
        const martContainer = document.getElementById('mart-product-container');
        const foodContainer = document.getElementById('menu-sub-categories');

        if(currentCategory === "가민G마트") {
            martContainer.classList.remove('hidden');
            foodContainer.classList.add('hidden');
            
            infoArea.innerHTML = `
                <div class="flex gap-4 items-center flex-col sm:flex-row text-center sm:text-left">
                    ${res.img ? `<img src="${res.img}" class="w-20 h-20 object-cover rounded-xl shadow-md shrink-0">` : ''}
                    <div class="min-w-0 flex-1">
                        <h2 class="text-2xl font-bold text-gray-800 truncate">${res.name}</h2>
                        <p class="text-xs text-blue-500 font-bold mt-1">카테고리: ${res.martCategory || '미분류'}</p>
                        <p class="text-lg text-[#2ac1bc] font-bold mt-1">${(res.price || 0).toLocaleString()}원</p>
                    </div>
                </div>
            `;
            renderMartItemPurchaseView(res);
        } else {
            martContainer.classList.add('hidden');
            foodContainer.classList.remove('hidden');
            
            infoArea.innerHTML = `<h2 class="text-2xl font-bold text-gray-800 break-all">${res.name}</h2><p class="text-sm text-gray-500 mt-2 font-bold">원하시는 메뉴와 옵션을 선택해주세요.</p>`;
            renderMenus(res);
        }
    }

    function renderMartItemPurchaseView(res) {
        const targetBox = document.getElementById('mart-items-list-box');
        targetBox.innerHTML = "";

        const wrapCard = document.createElement('div');
        wrapCard.className = "bg-white p-4 sm:p-5 shadow-sm rounded-xl border border-gray-100";
        wrapCard.innerHTML = `
            <div class="p-4 border rounded-xl bg-gray-50/50 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
                <div class="min-w-0 flex-1">
                    <p class="font-bold text-gray-800 text-base truncate">${res.name}</p>
                    <p class="text-sm text-[#2ac1bc] font-bold mt-1">${(res.price || 0).toLocaleString()}원</p>
                </div>
                <div class="flex items-center justify-between md:justify-end gap-4 shrink-0">
                    <div class="flex items-center gap-3 border rounded-full px-3 py-1 bg-white shadow-sm select-none">
                        <button onclick="updateMartQty(-1)" class="font-bold text-gray-300 px-1">-</button>
                        <span id="mart-qty-counter" class="text-xs font-bold w-4 text-center">1</span>
                        <button onclick="updateMartQty(1)" class="font-bold text-[#2ac1bc] px-1">+</button>
                    </div>
                    <button onclick="addMartItemToCart()" class="px-5 py-2.5 bg-[#2ac1bc] text-white text-xs font-bold rounded-full shadow-md hover:opacity-90 transition-opacity">장바구니 담기</button>
                </div>
            </div>
        `;
        targetBox.appendChild(wrapCard);
    }

    function updateMartQty(change) {
        const span = document.getElementById('mart-qty-counter');
        if(!span) return;
        let current = parseInt(span.innerText);
        current = Math.max(1, current + change);
        span.innerText = current;
    }

    function addMartItemToCart() {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const qty = parseInt(document.getElementById('mart-qty-counter').innerText);
        
        for(let i=0; i<qty; i++) {
            db.cart.push({ resName: "가민G마트", menuName: res.name, price: res.price || 0, optionsText: '없음' });
        }
        saveDB(); updateCartCount();
        alert(`${res.name} ${qty}개를 장바구니에 담았습니다.`);
    }

    function updateItemQty(cat, idx, change) {
        const span = document.getElementById(`qty-${cat}-${idx}`);
        let current = parseInt(span.innerText);
        current = Math.max(1, current + change);
        span.innerText = current;
    }

    function renderMenus(res) {
        const subCats = ['normal', 'set', 'side'];
        subCats.forEach(cat => {
            const container = document.getElementById(`menu-container-${cat}`);
            container.innerHTML = "";
            const menus = res.menus[cat] || [];
            
            if (menus.length === 0) {
                container.innerHTML = "<div class='text-center py-4 text-xs text-gray-400'>등록된 메뉴가 없습니다.</div>";
                return;
            }

            menus.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = "p-4 border rounded-xl bg-gray-50/30 mb-2 flex flex-col w-full";
                const compositionHtml = m.composition ? `<p class="text-[10px] text-gray-400 mt-0.5 break-all">구성: ${m.composition}</p>` : '';

                div.innerHTML = `
                    <div class="flex justify-between items-start gap-3 flex-col sm:flex-row">
                        <div class="flex gap-3 min-w-0 flex-1 w-full text-left">
                            ${m.img ? `<img src="${m.img}" class="w-16 h-16 object-cover rounded-lg shadow-sm shrink-0">` : `<div class="w-16 h-16 bg-gray-200 rounded-lg shrink-0 flex items-center justify-center text-xs text-gray-400">No Image</div>`}
                            <div class="min-w-0 flex-1">
                                <p class="font-bold text-gray-700 truncate">${m.name}</p>
                                ${compositionHtml}
                                <p class="text-sm text-[#2ac1bc] font-bold mt-1">${parseInt(m.price).toLocaleString()}원</p>
                            </div>
                        </div>
                        <div class="flex gap-1 w-full sm:w-auto justify-end border-t sm:border-0 pt-2 sm:pt-0 border-gray-100 shrink-0">
                            <button onclick="showOptionManageModal('${cat}', ${idx})" class="text-[10px] px-2 py-1.5 border border-gray-300 rounded-md bg-white text-gray-500 font-bold hover:bg-gray-50">옵션 관리</button>
                            <button onclick="showEditMenuModal('${cat}', ${idx})" class="text-[10px] px-2 py-1.5 border border-blue-200 rounded-md bg-white text-blue-500 font-bold hover:bg-blue-50">수정</button>
                            <button onclick="deleteMenu('${cat}', ${idx})" class="text-[10px] px-2 py-1.5 border border-red-200 rounded-md bg-white text-red-500 font-bold hover:bg-red-50">삭제</button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-3 pt-3 border-t border-gray-100">
                        <div class="flex items-center gap-3 border rounded-full px-3 py-1 bg-white shadow-sm select-none">
                            <button onclick="updateItemQty('${cat}', ${idx}, -1)" class="font-bold text-gray-300 px-1">-</button>
                            <span id="qty-${cat}-${idx}" class="text-xs font-bold w-4 text-center">1</span>
                            <button onclick="updateItemQty('${cat}', ${idx}, 1)" class="font-bold text-[#2ac1bc] px-1">+</button>
                        </div>
                        <button onclick="prepareAddToCart('${cat}', ${idx})" class="px-5 py-2 baemin-navy text-white text-xs font-bold rounded-full shadow-md hover:opacity-90 transition-opacity">장바구니 담기</button>
                    </div>`;
                container.appendChild(div);
            });
        });
    }

    function showEditMenuModal(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        const compositionInput = cat === 'set' 
            ? `<input id="edit-menu-composition" type="text" value="${menu.composition || ''}" placeholder="메뉴 구성 (예: 싸이버거+콜라+감튀)" class="w-full border p-2 rounded text-sm mb-2 bg-blue-50">` 
            : '';

        openModal("메뉴 수정", `
            <p class="text-[10px] text-blue-500 font-bold mb-1">* 이미지 파일을 입력창으로 끌어다 놓으세요</p>
            <input id="edit-menu-name" type="text" value="${menu.name}" placeholder="메뉴 이름" class="w-full border p-2 rounded text-sm mb-2">
            ${compositionInput}
            <input id="edit-menu-price" type="number" value="${menu.price}" placeholder="가격" class="w-full border p-2 rounded text-sm mb-2">
            <input id="edit-menu-img" type="text" value="${menu.img || ''}" placeholder="이미지 URL 또는 파일을 드래그하세요" 
                class="w-full border p-2 rounded text-sm bg-gray-50 focus:bg-white transition-colors"
                ondrop="handleImageDrop(event, 'edit-menu-img')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
        `, () => {
            const newName = document.getElementById('edit-menu-name').value;
            const newPrice = parseInt(document.getElementById('edit-menu-price').value) || 0;
            const newImg = document.getElementById('edit-menu-img').value;
            const newComposition = cat === 'set' ? document.getElementById('edit-menu-composition').value : '';
            
            if(!newName) return;
            menu.name = newName;
            menu.price = newPrice;
            menu.img = newImg;
            if(cat === 'set') menu.composition = newComposition;
            
            saveDB();
            renderMenus(res);
            closeModal();
        });
    }

    function deleteMenu(cat, idx) {
        if(confirm("이 메뉴를 삭제하시겠습니까?")) {
            const res = db.restaurants.find(r => r.id === currentRestaurantId);
            res.menus[cat].splice(idx, 1);
            saveDB();
            renderMenus(res);
        }
    }

    function showOptionManageModal(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        if(!menu.options) menu.options = [];

        let listHtml = menu.options.map((opt, oIdx) => `
            <div class="flex justify-between items-center bg-gray-100 p-2 rounded-lg text-sm">
                <span class="truncate pr-2">${opt.name} (+${opt.price.toLocaleString()}원)</span>
                <button onclick="removeOption('${cat}', ${idx}, ${oIdx})" class="text-red-500 font-bold text-lg px-1">×</button>
            </div>
        `).join('');

        openModal(`[${menu.name}] 옵션 관리`, `
            <div class="flex flex-col gap-2 mb-4 max-h-[30vh] overflow-y-auto">${listHtml || '<p class="text-center text-gray-400 text-xs py-2">등록된 옵션이 없습니다.</p>'}</div>
            <div class="border-t pt-3">
                <label class="text-xs font-bold text-gray-500 block mb-1">옵션 추가</label>
                <input id="opt-name" type="text" placeholder="옵션명 (예: 치즈추가)" class="w-full border p-2 rounded text-sm mb-2">
                <input id="opt-price" type="number" placeholder="추가금액 (숫자)" class="w-full border p-2 rounded text-sm">
            </div>
        `, () => {
            const name = document.getElementById('opt-name').value;
            const price = parseInt(document.getElementById('opt-price').value) || 0;
            if(!name) return closeModal();
            menu.options.push({ name, price });
            saveDB();
            showOptionManageModal(cat, idx);
        });
    }

    function removeOption(cat, idx, oIdx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        res.menus[cat][idx].options.splice(oIdx, 1);
        saveDB();
        showOptionManageModal(cat, idx);
    }

    function prepareAddToCart(cat, idx) {
        const res = db.restaurants.find(r => r.id === currentRestaurantId);
        const menu = res.menus[cat][idx];
        const qty = parseInt(document.getElementById(`qty-${cat}-${idx}`).innerText);

        if(!menu.options || menu.options.length === 0) {
            addToCartWithFinalInfo(res.name, menu.name, menu.price, qty, []);
            return;
        }

        openModal("옵션 선택", `
            <p class="text-sm font-bold mb-3">${menu.name}를 더 맛있게!</p>
            <div class="flex flex-col gap-2 max-h-[40vh] overflow-y-auto pr-1">
                ${menu.options.map((opt, i) => `
                    <label class="flex justify-between items-center p-3 border rounded-xl cursor-pointer hover:bg-gray-50 select-none">
                        <span class="text-sm truncate pr-2">${opt.name} (+${opt.price.toLocaleString()}원)</span>
                        <input type="checkbox" name="menu-opt" value="${i}" class="w-4 h-4 accent-[#2ac1bc] shrink-0">
                    </label>
                `).join('')}
            </div>
        `, () => {
            const selectedIdxs = Array.from(document.querySelectorAll('input[name="menu-opt"]:checked')).map(el => parseInt(el.value));
            const selectedOpts = selectedIdxs.map(i => menu.options[i]);
            addToCartWithFinalInfo(res.name, menu.name, menu.price, qty, selectedOpts);
        });
    }

    function addToCartWithFinalInfo(resName, menuName, basePrice, qty, selectedOpts) {
        const optPrice = selectedOpts.reduce((sum, o) => sum + o.price, 0);
        const optText = selectedOpts.map(o => o.name).join(', ') || '없음';
        const finalPrice = basePrice + optPrice;

        for(let i=0; i<qty; i++) {
            db.cart.push({ resName, menuName, price: finalPrice, optionsText: optText });
        }
        saveDB(); updateCartCount(); closeModal();
        alert(`${menuName} ${qty}개를 담았습니다.`);
    }

    function showAddRestaurantModal() {
        const isMart = currentCategory === "가민G마트";
        
        if (isMart) {
            if(!db.globalMartCategories) db.globalMartCategories = ["식료품", "생활용품", "신선식품"];
            
            let selectOptionsHtml = `<option value="">-- 카테고리 선택 없음 (미분류) --</option>`;

            openModal("마트 신규 상품 명명 등록", `
                <p class="text-[10px] text-blue-500 font-bold mb-1">* 이미지 파일 드래그 호환</p>

                    <label class="text-xs text-gray-500 font-bold mb-1 block">소속 지정 카테고리</label>
                    <select id="new-res-cat-select" class="w-full border p-2 rounded text-sm bg-white">${selectOptionsHtml}</select>
                </div>
                <input id="new-res-price" type="number" placeholder="판매 가격 설정" class="w-full border p-3 rounded-lg text-sm mb-2">
                <input id="new-res-img" type="text" placeholder="이미지 링크 또는 파일 드래그 추가" 
                    class="w-full border p-3 rounded-lg text-sm bg-gray-50 focus:bg-white transition-colors"
                    ondrop="handleImageDrop(event, 'new-res-img')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
            `, () => {
                const name = document.getElementById('new-res-name').value.trim();
                const selectedCat = document.getElementById('new-res-cat-select').value;
                const price = parseInt(document.getElementById('new-res-price').value) || 0;
                const img = document.getElementById('new-res-img').value;
                if(!name) return;

                db.restaurants.push({ 
                    id: Date.now(), 
                    category: currentCategory, 
                    name: name, 
                    martCategory: selectedCat,
                    price: price,
                    img: img,
                    menus: { normal: [], set: [], side: [] } 
                });
                saveDB(); renderRestaurants(); closeModal();
            });
        } else {
            openModal("가게 등록", `<input id="new-res-name" type="text" placeholder="식당 이름을 입력하세요" class="w-full border p-3 rounded-lg text-sm">`, () => {
                const name = document.getElementById('new-res-name').value.trim();
                if(!name) return;
                db.restaurants.push({ id: Date.now(), category: currentCategory, name: name, menus: { normal: [], set: [], side: [] } });
                saveDB(); renderRestaurants(); closeModal();
            });
        }
    }

    function showAddMenuModal(type) {
        const compositionInput = type === 'set' 
            ? `<input id="new-menu-composition" type="text" placeholder="메뉴 구성 (예: 싸이버거+콜라+감튀)" class="w-full border p-2 rounded text-sm mb-2 bg-blue-50">` 
            : '';

        openModal("메뉴 등록", `
            <p class="text-[10px] text-blue-500 font-bold mb-1">* 이미지 파일을 입력창으로 끌어다 놓으세요</p>
            <input id="new-menu-name" type="text" placeholder="메뉴 이름" class="w-full border p-2 rounded text-sm mb-2">
            ${compositionInput}
            <input id="new-menu-price" type="number" placeholder="가격" class="w-full border p-2 rounded text-sm mb-2">
            <input id="new-menu-img" type="text" placeholder="이미지 URL 또는 파일을 드래그하세요" 
                class="w-full border p-2 rounded text-sm bg-gray-50 focus:bg-white transition-colors"
                ondrop="handleImageDrop(event, 'new-menu-img')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)">
        `, () => {
            const name = document.getElementById('new-menu-name').value;
            const price = parseInt(document.getElementById('new-menu-price').value) || 0;
            const img = document.getElementById('new-menu-img').value;
            const composition = type === 'set' ? document.getElementById('new-menu-composition').value : '';
            if(!name) return;
            const res = db.restaurants.find(r => r.id === currentRestaurantId);
            res.menus[type].push({ name, price, img, composition, options: [] });
            saveDB(); renderMenus(res); closeModal();
        });
    }

    function updateCartCount() {
        document.getElementById('cart-count').innerText = db.cart.length;
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        const totalDiv = document.getElementById('cart-total');
        container.innerHTML = "";
        let total = 0;
        if(db.cart.length === 0) {
            container.innerHTML = "<p class='text-center py-10 text-gray-400 font-bold'>장바구니가 비어있습니다.</p>";
        } else {
            db.cart.forEach((item) => {
                total += item.price;
                container.innerHTML += `
                    <div class="py-3 border-b border-gray-100 last:border-0">
                        <div class="flex justify-between items-start gap-2">
                            <div class="min-w-0 flex-1 text-left">
                                <p class="text-[10px] text-gray-400 font-bold">${item.resName}</p>
                                <p class="font-bold text-gray-800 truncate">${item.menuName}</p>
                                <p class="text-[10px] text-blue-400 font-bold break-all">옵션: ${item.optionsText}</p>
                            </div>
                            <p class="font-bold text-sm text-gray-700 shrink-0">${item.price.toLocaleString()}원</p>
                        </div>
                    </div>`;
            });
        }
        totalDiv.innerText = `총 결제금액: ${total.toLocaleString()}원`;
    }

    function startDeliverySimulation() {
        if(db.cart.length === 0) return alert("장바구니가 비어있습니다.");
        showSection('delivery-status-section');
        const steps = ["주문 확인 중...", "음식 준비 중...", "라이더 배정 중...", "집으로 오고 있어요!", "배달 완료! 😋"];
        let currentStep = 0;
        const interval = setInterval(() => {
            currentStep++;
            const progress = (currentStep / (steps.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = progress + "%";
            document.getElementById('status-text').innerText = steps[currentStep];
            if(currentStep >= steps.length - 1) {
                clearInterval(interval);
                db.cart = []; saveDB(); updateCartCount();
            }
        }, 2000);
    }

    function saveDB() { localStorage.setItem('deliveryDB_v4', JSON.stringify(db)); }
    
    function openModal(title, content, onConfirm) {
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-content').innerHTML = content;
        document.getElementById('modal-confirm-btn').onclick = onConfirm;
        document.getElementById('modal').classList.remove('hidden');
    }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    init();
</script>

</body>
</html>
